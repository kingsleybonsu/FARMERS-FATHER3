<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Farmer Profile | Farmers Father</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f6f8;
      color:#222;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
    }

    /* HEADER */

    .header{
      background:#166534;
      padding:18px 0;
    }

    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      color:white;
      font-size:24px;
      font-weight:bold;
      text-decoration:none;
    }

    .back-btn{
      text-decoration:none;
      color:white;
      background:#16a34a;
      padding:10px 18px;
      border-radius:8px;
    }

    /* PROFILE */

    .profile-card{
      background:white;
      margin-top:40px;
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);

      display:flex;
      gap:30px;
      flex-wrap:wrap;
      align-items:center;
    }

    .profile-image img{
      width:170px;
      height:170px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #dcfce7;
    }

    .profile-info{
      flex:1;
    }

    .profile-info h1{
      color:#166534;
      margin-bottom:10px;
    }

    .profile-info p{
      margin-bottom:10px;
      color:#555;
      line-height:1.7;
    }

    /* ACTION BUTTONS */

    .actions{
      margin-top:20px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn{
      text-decoration:none;
      padding:14px 22px;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
    }

    .call{
      background:#16a34a;
      color:white;
    }

    .call:hover{
      background:#15803d;
    }

    .whatsapp{
      border:2px solid #16a34a;
      color:#16a34a;
    }

    .whatsapp:hover{
      background:#16a34a;
      color:white;
    }

    /* PRODUCTS */

    .products{
      margin-top:50px;
      margin-bottom:60px;
    }

    .products h2{
      margin-bottom:25px;
      color:#166534;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card h3{
      margin-bottom:10px;
    }

    .price{
      color:#16a34a;
      font-size:22px;
      font-weight:bold;
      margin-top:10px;
    }

    /* MOBILE */

    @media(max-width:768px){

      .profile-card{
        text-align:center;
        justify-content:center;
      }

      .actions{
        justify-content:center;
      }

    }

  </style>

</head>

<body>

  <!-- HEADER -->

  <header class="header">

    <div class="container nav">

      <a href="index.html" class="logo">
        Farmers Father
      </a>

      <a href="market.html" class="back-btn">
        ← Back
      </a>

    </div>

  </header>

  <!-- PROFILE SECTION -->

  <section class="container">

    <div class="profile-card">

      <div class="profile-image">

        <img
          id="farmerImage"
          src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
        >

      </div>

      <div class="profile-info">

        <h1 id="farmerName">
          Farmer Name
        </h1>

        <p id="farmName">
          Farm Name
        </p>

        <p id="farmerLocation">
          Location
        </p>

        <p id="farmerBio">
          Passionate farmer providing fresh farm produce across Ghana.
        </p>

        <div class="actions">

          <a href="#" class="btn call" id="callBtn">
            📞 Call Farmer
          </a>

          <a href="#" class="btn whatsapp" id="whatsappBtn">
            💬 WhatsApp
          </a>

        </div>

      </div>

    </div>

  </section>

  <!-- FARMER PRODUCTS -->

  <section class="container products">

    <h2>
      Products By This Farmer
    </h2>

    <div class="grid" id="productContainer">

    </div>

  </section>

  <script>

    // GET FARMER DATA

    const farmer =
    JSON.parse(localStorage.getItem("selectedFarmer"));

    // IF NO FARMER

    if(!farmer){

      alert("No farmer selected");

      window.location.href = "market.html";

    }

    // DISPLAY PROFILE

    document.getElementById("farmerName")
    .innerText = farmer.name;

    document.getElementById("farmName")
    .innerText = "🌾 Farm: " + farmer.farm;

    document.getElementById("farmerLocation")
    .innerText = "📍 Location: " + farmer.location;

    document.getElementById("farmerBio")
    .innerText =
    farmer.bio ||
    "Trusted farmer selling fresh produce directly to buyers.";

    // CALL BUTTON

    document.getElementById("callBtn")
    .href = `tel:${farmer.phone}`;

    // WHATSAPP BUTTON

    document.getElementById("whatsappBtn")
    .href =
    `https://wa.me/${farmer.phone}`;

    // GET PRODUCTS

    const allProducts =
    JSON.parse(localStorage.getItem("products")) || [];

    // FILTER FARMER PRODUCTS

    const farmerProducts =
    allProducts.filter(product =>
      product.phone === farmer.phone
    );

    // DISPLAY PRODUCTS

    const container =
    document.getElementById("productContainer");

    if(farmerProducts.length === 0){

      container.innerHTML =
      "<p>No products uploaded yet.</p>";

    }

    farmerProducts.forEach(product => {

      const card =
      document.createElement("div");

      card.className = "card";

      card.innerHTML = `

        <img src="${product.image}" alt="">

        <div class="card-content">

          <h3>${product.name}</h3>

          <p>
            📦 ${product.quantity}
          </p>

          <div class="price">
            ${product.price}
          </div>

        </div>

      `;

      container.appendChild(card);

    });

  </script>
<script src="auth.js"></script>
<script>protectFarmerPage();</script>
</body>
</html>
